# Added: 2026-04-25
# Catches: Route handlers calling backend methods directly (e.g. `state.backend.generate(...)`)
#          instead of going through the service layer.
# Why I added this: When `state.backend` is in scope, Claude reaches for
#                   `state.backend.generate()` instead of `svc.generate()`. The service
#                   layer handles orchestration / persistence / evals — bypassing it
#                   skips all of that silently.
# Adapt: Tune the constraints regex to match the backend methods you want to gate.
#        The example below bans only `generate`, `repose`, `animate` calls (which
#        are the orchestration entry points; introspection like `backend.client.base_url`
#        legitimately stays).

id: routes-must-use-service
language: python
rule:
  pattern: $STATE.backend.$METHOD($$$)
constraints:
  METHOD:
    regex: "^(generate|repose|animate)$"
files:
  - "**/your_app/routes.py"
message: |
  Routes must call the service layer (e.g. `svc.generate()`), not the backend directly.

  Why this rule exists: the service layer handles orchestration, persistence, evals,
  and version-bumping. Calling backend methods directly skips all of that.
severity: error
