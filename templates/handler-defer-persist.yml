# Added: 2026-04-25
# Catches: Async handler functions matching a name pattern (e.g. `_run_*`) that call
#          `save_graph` (or any persistence method) directly.
# Why I added this: I kept catching Claude inlining `save_graph()` calls inside `_run_*`
#                   handlers, which broke the defer-to-accept pattern (user couldn't
#                   discard generated results before they hit disk). Want this enforced
#                   at the boundary, not after the fact.
# Adapt: Change the function-name regex (`^_run_`), the persistence call shape
#        (`save_graph`), and the file path to match your project.

id: handler-defer-persist
language: python
rule:
  pattern: $X.save_graph($$$)
  inside:
    kind: function_definition
    stopBy: end
    has:
      field: name
      regex: "^_run_"
files:
  - "**/your_app/runner.py"
message: |
  Handler functions named `_run_*` must NOT call `save_graph` directly.
  Defer persistence to the accept handler (defer-to-accept pattern).

  Why this rule exists: handlers compute results, the user reviews them, and
  a separate accept step persists. Inline persistence breaks that — users
  can't discard generated results before they hit disk.
severity: error
