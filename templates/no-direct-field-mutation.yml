# Added: 2026-04-25
# Catches: LLM mutating an entity field (e.g. `node.prompt = X`) directly outside the service layer.
# Why I added this: I kept seeing Claude assign `edge.prompt = X` directly when there's
#                   a service method (`update_prompt()`) that handles persistence + version-bumping.
#                   Catching this at edit time, not in code review.
# Adapt: Change the field name (`prompt`) and the file globs to match your project.

id: no-direct-field-mutation
language: python
rule:
  pattern: $X.prompt = $Y
files:
  - "**/your_app/routes.py"
  - "**/your_app/handlers.py"
message: |
  Direct mutation of `.prompt` outside the service layer is forbidden.
  Use the service method (e.g. `svc.update_prompt()`) instead.

  Why this rule exists: persistence and version-bumping live in the service layer.
  Bypassing it leaves the system in an inconsistent state.
severity: error
